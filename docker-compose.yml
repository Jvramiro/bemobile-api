services:
  db:
    image: mysql:8.0
    container_name: bemobile_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bemobile_api
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  gateways:
    image: matheusprotzen/gateways-mock
    container_name: bemobile_gateways
    restart: always
    ports:
      - "3001:3001"
      - "3002:3002"

  app:
    build: .
    container_name: bemobile_app
    restart: always
    ports:
      - "3333:3333"
    environment:
      - NODE_ENV=production
      - APP_KEY=-ZPHXuQqBfLJGb8FKx8aoZPo88V2Piv6
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_DATABASE=bemobile_api
    depends_on:
      - db
      - gateways

volumes:
  db_data: